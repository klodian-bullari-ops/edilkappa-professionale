async function initWorkMap(){const box=document.getElementById('workMapCanvas');if(!box)return;if(typeof L==='undefined'){box.innerHTML='<div class="empty">Mappa non disponibile. Controlla la connessione internet.</div>';return}box.innerHTML='';const map=L.map(box).setView([45.514,9.287],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);const bounds=[],jobs=mapWorkItems().filter(x=>mapFilters[x.category]),groups=new Map();let found=0;for(const job of jobs){if(!document.getElementById('workMapCanvas'))return;const point=await geocodeAddress(job.address);if(!point)continue;found++;const key=point.map(n=>n.toFixed(5)).join(',');if(!groups.has(key))groups.set(key,{point,jobs:[]});groups.get(key).jobs.push(job)}for(const group of groups.values()){bounds.push(group.point);const categories=group.jobs.map(x=>x.category),color=categories.includes('active')?'#e47d28':categories.includes('lifeline')?'#c0394b':categories.includes('visit')?'#7b4bb7':categories.includes('planned')?'#316b8c':'#315c3b',popup=group.jobs.map(job=>`<div style="margin-bottom:9px"><b>${esc(job.title)}</b><br>${esc(job.kind)} · ${esc(job.date)}<br>${esc(job.client)}<br><b>${esc(job.status)}</b></div>`).join('')+`<a target="_blank" href="https://maps.google.com/?q=${encodeURIComponent(group.jobs[0].address)}">Indicazioni</a>`;L.circleMarker(group.point,{radius:10,color:'#fff',weight:3,fillColor:color,fillOpacity:1}).addTo(map).bindPopup(popup)}if(bounds.length)map.fitBounds(bounds,{padding:[35,35],maxZoom:15});if(!found&&jobs.length)box.insertAdjacentHTML('beforeend','<div class="notice" style="position:absolute;z-index:500;left:12px;right:12px;bottom:12px">Nessun indirizzo riconosciuto. Controlla che via, numero civico e città siano completi.</div>')}

function workerIndividualHours(){const person=currentStaff(),team=WORKERS.find(x=>x.id===person?.team),today=localToday(),todayEntries=individualHourRows().filter(x=>x.worker===role&&x.date===today),monthEntries=individualHourRows().filter(x=>x.worker===role&&x.date.startsWith(timesheetMonth)),total=monthEntries.reduce((n,x)=>n+Number(x.hours||0),0);return pageHead('Comunica le mie ore','Inserisci soltanto le tue ore personali')+`<div class="notice"><b>${esc(person?.name||'Operaio')} · ${esc(team?.name||'Senza squadra')}</b><br>Promemoria giornaliero alle ${esc(person?.reminderTime||'18:00')}.</div><div class="actions" style="margin:14px 0"><button class="btn light" onclick="requestHourNotifications()">🔔 Attiva notifica</button><button class="btn light" onclick="downloadHoursReminder()">📅 Promemoria giornaliero</button></div><div class="grid cols"><section class="card"><h3>Le mie ore di oggi</h3><form class="formGrid" onsubmit="saveIndividualHours(event)">${field('Data','date','date',today)}<div class="field"><label>Lavoro / cantiere</label><select name="job" required>${teamJobOptions(person?.team||'')}</select></div><div class="field"><label>Ore lavorate</label><input name="hours" type="number" min="0" step="0.5" required></div><div class="field full"><label>Note</label><textarea name="notes" placeholder="Straordinari, assenze, trasferte o informazioni utili"></textarea></div><div class="field full"><button class="btn lime" type="submit">Comunica le mie ore</button></div></form></section><section class="card"><div class="cardHead"><h3>Oggi</h3>${badge(todayEntries.length?'Comunicate':'Da comunicare')}</div><div class="list">${todayEntries.map(x=>`<div class="row"><div class="rowIcon">⏱️</div><div class="rowBody"><b>${esc(x.job)}</b><small>${Number(x.hours||0).toFixed(1)} ore · ${esc(x.notes||'')}</small></div><button class="btn sm light" onclick="openIndividualHoursEntry('${x.id}')">Modifica</button></div>`).join('')||'<div class="empty">Non hai ancora comunicato l function saveIndividualHours(event){event.preventDefault();const person=currentStaff(),team=WORKERS.find(x=>x.id===person?.team);if(!person)return alert('Profilo operaio non trovato.');const f=new FormData(event.target);db.timesheets.push({id:uid('ore'),date:f.get('date'),worker:person.id,workerName:person.name,team:person.team,teamName:team?.name||'Senza squadra',job:f.get('job'),hours:Number(f.get('hours')||0),notes:f.get('notes'),createdAt:new Date().toISOString()});save();alert('Le tue ore sono state comunicate.');render()}

downloadHoursReminder=function(){if(isOffice())return;const person=currentStaff();if(!person)return;const date=localToday().replace(/-/g,''),time=String(person.reminderTime||'18:00').replace(':','')+'00',content=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//EDILKAPPA SAS//Ore//IT','CALSCALE:GREGORIAN','BEGIN:VEVENT',`UID:ore-${person.id}@edilkappa.com`,`DTSTART:${date}T${time}`,'DURATION:PT10M','RRULE:FREQ=DAILY',`SUMMARY:${icsText('Comunicare le mie ore · '+person.name)}`,'DESCRIPTION:Inserire nell’app EDILKAPPA le proprie ore lavorate.','BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY','DESCRIPTION:Ricordati di comunicare le tue ore lavorate.','END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n'),blob=new Blob([content],{type:'text/calendar;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='Promemoria_ore_'+person.name.replace(/[^a-z0-9]/gi,'_')+'.ics';a.click();setTimeout(()=>URL.revokeObjectURL(url),10000)};
checkHourReminders=async function(){if(isOffice())return;const person=currentStaff();if(!person)return;const today=localToday(),now=new Date(),clock=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');if(clock<(person.reminderTime||'18:00')||individualHourRows().some(x=>x.worker===person.id&&x.date===today))return;const key='ek_hours_reminder_'+person.id+'_'+today;if(localStorage.getItem(key))return;if('Notification'in window&&Notification.permission==='granted'){const title='Ore giornaliere EDILKAPPA',options={body:`${person.name}, ricordati di comunicare le tue ore lavorate.`,tag:key};try{const reg='serviceWorker'in navigator?await navigator.serviceWorker.getRegistration():null;if(reg)await reg.showNotification(title,options);else new Notification(title,options);localStorage.setItem(key,'1')}catch(e){}}};

function teamAssignments(id){return db.sites.filter(x=>x.worker===id).length+(db.roofs||[]).filter(x=>x.worker===id).length+(db.drains||[]).filter(x=>x.worker===id).length}
function openTeam(id){const item=WORKERS.find(x=>x.id===id)||{name:'',member1:'',member2:'',phone:'',reminderTime:'18:00'};modal(id?'Modifica squadra':'Nuova squadra',`<div class="formGrid">${field('Nome squadra','name','text',item.name)}${field('Telefono squadra','phone','tel',item.phone||'')}${field('Componente 1','member1','text',item.member1||'')}${field('Componente 2','member2','text',item.member2||'')}${field('Promemoria comunicazione ore','reminderTime','time',item.reminderTime||'18:00')}</div>`,f=>{const data=Object.fromEntries(f);if(id)Object.assign(item,data);else WORKERS.push({id:uid('sq'),...data})})}
function deleteTeam(id){const item=WORKERS.find(x=>x.id===id);if(!item)return;const assigned=teamAssignments(id);if(!confirm(`Eliminare ${item.name}?${assigned?' I '+assigned+' incarichi collegati diventeranno non assegnati.':''}`))return;[...(db.sites||[]),...(db.roofs||[]),...(db.drains||[])].forEach(x=>{if(x.worker===id)x.worker=''});const i=WORKERS.findIndex(x=>x.id===id);WORKERS.splice(i,1);save();initRoles();render()}
function deleteItem(collection,id,label){if(!confirm(`Eliminare definitivamente ${label}?`))return;db[collection]=db[collection].filter(x=>x.id!==id);save();render()}
function renameClient(oldName,newName){if(oldName===newName)return;['inspections','sites','quotes','drone','lifelines','roofs','drains'].forEach(k=>(db[k]||[]).forEach(x=>{if(x.client===oldName)x.client=newName}))}
function openCondo(id){const item=db.condomini.find(x=>x.id===id)||{name:'',address:'',manager:'',phone:'',notes:''},oldName=item.name;modal(id?'Modifica cliente':'Nuovo condominio',`<div class="formGrid">${field('Condominio / cliente','name','text',item.name)}${field('Indirizzo','address','text',item.address)}${field('Amministratore','manager','text',item.manager)}${field('Telefono','phone','tel',item.phone)}${field('Note accesso','notes','text',item.notes,true)}</div>`,f=>{const data=Object.fromEntries(f);if(id){renameClient(oldName,data.name);Object.assign(item,data)}else db.condomini.push({id:uid('c'),...data})})}
function clientOptions(selected=''){return db.condomini.map(c=>`<option ${c.name===selected?'selected':''}>${esc(c.name)}</option>`).join('')}
function teamOptions(selected=''){return '<option value="">Non assegnata</option>'+WORKERS.map(w=>`<option value="${w.id}" ${w.id===selected?'selected':''}>${esc(w.name)} · ${staffForTeam(w.id).length} operai</option>`).join('')}

async function saveLifelineFiles(files){const out=[];for(const file of Array.from(files||[])){const type=file.type||(/\.pdf$/i.test(file.name)?'application/pdf':'');if(!(type==='application/pdf'||type.startsWith('image/')))throw new Error('Puoi caricare soltanto documenti PDF e fotografie');const key=uid('doc')+'-'+Math.random().toString(36).slice(2,7);await storePdf(key,file);out.push({key,name:file.name,type,size:file.size})}return out}

function openRoof(id){const item=db.roofs.find(x=>x.id===id)||{client:'',type:'Pulizia gronde',address:'',date:new Date().toISOString().slice(0,10),worker:WORKERS[0]?.id||'',frequency:'Intervento singolo',access:'Da verificare',notes:'',status:'Pianificato',files:[],updates:[]},types=['Pulizia gronde','Pulizia tetto','Controllo copertura','Spurgo pluviali','Rimozione foglie e detriti','Pulizia gronde e controllo tetto'];modal(id?'Modifica tetto e gronde':'Nuovo intervento tetto e gronde',`<div class="formGrid"><div class="field"><label>Condominio / cliente</label><select name="client">${clientOptions(item.client)}</select></div><div class="field"><label>Tipo intervento</label><select name="type">${selectOptions(types,item.type)}</select></div>${field('Indirizzo','address','text',item.address,true)}${field('Data programmata','date','date',item.date)}<div class="field"><label>Squadra assegnata</label><select name="worker">${teamOptions(item.worker)}</select></div><div class="field"><label>Periodicità</label><select name="frequency">${selectOptions(['Intervento singolo','Ogni 6 mesi','Annuale','Due volte l’anno'],item.frequency)}</select></div><div class="field"><label>Modalità di accesso</label><select name="access">${selectOptions(['Da scala','Da copertura','Con piattaforma','Con linea vita','Da verificare'],item.access)}</select></div><div class="field full"><label>Indicazioni operative</label><textarea name="notes">${esc(item.notes)}</textarea></div><div class="field full"><label>Nuove foto e documenti</label><input name="files" type="file" accept="application/pdf,.pdf,image/*" multiple></div></div>`,async f=>{const files=await saveLifelineFiles(f.getAll('files').filter(x=>x.size)),data={client:f.get('client'),type:f.get('type'),address:f.get('address'),date:f.get('date'),worker:f.get('worker'),frequency:f.get('frequency'),access:f.get('access'),notes:f.get('notes')};if(id){Object.assign(item,data);item.files=(item.files||[]).concat(files)}else db.roofs.push({id:uid('tg'),...data,status:'Pianificato',files,updates:[]})})}
function addRoofFiles(id){const item=db.roofs.find(x=>x.id===id);if(!item)return;modal('Aggiungi foto o documenti',`<div class="notice"><b>${esc(item.client)}</b><br>${esc(item.type)} · ${esc(item.address)}</div><div style="height:14px"></div><div class="field"><label>Foto prima/dopo o documenti</label><input name="files" type="file" accept="application/pdf,.pdf,image/*" capture="environment" multiple required></div>`,async f=>{const files=await saveLifelineFiles(f.getAll('files'));item.files=(item.files||[]).concat(files)})}

<script>
window.EdilKappaLocal={
  getDB:()=>db,
  getRole:()=>role,
  getView:()=>view,
  persist:()=>localStorage.setItem(KEY,JSON.stringify(db)),
  render:()=>render(),
  go:(next)=>{view=next;render()},
  readFile:(key)=>readPdf(key),
  setRole:(next)=>{role=next;localStorage.setItem('ek_role',role);initRoles()},
  setWorkerRole:(profile,uid)=>{
    const teamId=profile.teamId||'cloud-team';
    if(!db.teams.some((team)=>team.id===teamId))db.teams.push({id:teamId,name:'Squadra assegnata',member1:profile.displayName,member2:'',phone:'',reminderTime:'18:00'});
    WORKERS=db.teams;
    const personId='cloud-'+uid;
    let person=db.staff.find((item)=>item.id===personId);
    if(!person){person={id:personId,name:profile.displayName||profile.email,phone:'',team:teamId,reminderTime:'18:00'};db.staff.push(person)}
    else{person.name=profile.displayName||profile.email;person.team=teamId}
    STAFF=db.staff;role=personId;localStorage.setItem('ek_role',role);initRoles();
  },
  clearRestrictedData:()=>{
    ['condomini','inspections','sites','quotes','reports','timesheets','drone','lifelines','roofs','drains','expenses','deadlines','payments','documents','teams','staff','portalUsers'].forEach((key)=>{db[key]=[]});
    db.staffInitialized=true;WORKERS=db.teams;STAFF=db.staff;localStorage.setItem(KEY,JSON.stringify(db));
  },
  clearDeviceData:()=>localStorage.removeItem(KEY)
};
</script>
